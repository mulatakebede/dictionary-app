<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>እንግሊዝኛ - አማርኛ መዝገበ ቃላት</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f7971e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- ... (your existing CSS here) ... -->
    <style>
        /* ... (your existing styles) ... */
    </style>
</head>
<body>
    <!-- ... (your existing HTML) ... -->

    <script>
        // ================================================================
        //  CONFIGURATION
        // ================================================================

        // 🔥 CHANGE THIS TO YOUR GITHUB CSV URL
        const CSV_URL = 'https://raw.githubusercontent.com/YOUR-USERNAME/YOUR-REPO/main/wordWebDic.csv';

        // ================================================================
        //  DICTIONARY ENGINE
        // ================================================================

        const dictionary = {};
        let totalWords = 0;
        let dataLoaded = false;

        // ... (your existing dictionary functions) ...

        // ================================================================
        //  CSV PARSER
        // ================================================================

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return [];

            // Try to find headers
            const firstLine = lines[0].toLowerCase();
            let wordIdx = 0,
                posIdx = 1,
                rootIdx = 2,
                meaningIdx = 3,
                amharicIdx = 4;

            // Check if first line has headers
            if (firstLine.includes('word') && firstLine.includes('amharic')) {
                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());
                wordIdx = headers.findIndex(h => h === 'word');
                posIdx = headers.findIndex(h => h === 'post');
                rootIdx = headers.findIndex(h => h === 'root');
                meaningIdx = headers.findIndex(h => h === 'meaning');
                amharicIdx = headers.findIndex(h => h === 'amharic');
                // Start from line 1 (skip headers)
                var startLine = 1;
            } else {
                var startLine = 0;
            }

            const entries = [];
            for (let i = startLine; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const values = [];
                let current = '';
                let inQuotes = false;
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());

                const word = (values[wordIdx] || '').replace(/^"|"$/g, '').trim();
                const pos = (values[posIdx] || '').replace(/^"|"$/g, '').trim();
                const root = (values[rootIdx] || '').replace(/^"|"$/g, '').trim();
                const meaning = (values[meaningIdx] || '').replace(/^"|"$/g, '').trim();
                const amharic = (values[amharicIdx] || '').replace(/^"|"$/g, '').trim();

                if (word && amharic) {
                    entries.push([word, pos, root, meaning, amharic]);
                }
            }
            return entries;
        }

        // ================================================================
        //  LOAD FROM GITHUB
        // ================================================================

        async function loadDictionaryFromGitHub() {
            try {
                console.log('📥 Loading dictionary from GitHub...');
                const response = await fetch(CSV_URL);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const csvText = await response.text();
                const entries = parseCSV(csvText);

                if (entries.length === 0) {
                    throw new Error('No valid entries found in CSV');
                }

                console.log(`✅ Loaded ${entries.length} words from GitHub`);
                buildDictionary(entries);
                showToast(`✅ ${entries.length} ቃላት ተጭነዋል (ከGitHub)`);

            } catch (error) {
                console.error('❌ Failed to load from GitHub:', error);
                showToast('⚠️ ከGitHub መጫን አልተቻለም, ከአካባቢ እየተጫነ...');
                // Fallback to local data
                loadLocalData();
            }
        }

        // ================================================================
        //  LOAD FROM LOCAL (dictionary-data.js)
        // ================================================================

        function loadLocalData() {
            if (typeof DICTIONARY_DATA !== 'undefined' && DICTIONARY_DATA.length > 0) {
                console.log(`📚 Using local data: ${DICTIONARY_DATA.length} words`);
                buildDictionary(DICTIONARY_DATA);
                showToast(`📚 ${DICTIONARY_DATA.length} ቃላት ተጭነዋል (ከአካባቢ)`);
            } else {
                console.warn('⚠️ No local data found');
                document.getElementById('results').innerHTML = `
                    <div class="no-result">
                        <div class="icon">📂</div>
                        <div class="text">ምንም ውሂብ አልተገኘም</div>
                        <div style="color:var(--text-muted);font-size:13px;margin-top:4px;opacity:0.6;">
                            እባክዎ የCSV ፋይልዎን በGitHub ላይ ያስቀምጡ
                        </div>
                    </div>
                `;
            }
        }

        // ================================================================
        //  BUILD DICTIONARY
        // ================================================================

        function buildDictionary(entries) {
            for (const key in dictionary) {
                delete dictionary[key];
            }
            totalWords = 0;

            for (const entry of entries) {
                const word = entry[0].toLowerCase();
                const pos = entry[1] || '';
                const root = entry[2] || '';
                const meaning = entry[3] || '';
                const amharic = entry[4] || '';

                if (!dictionary[word]) {
                    dictionary[word] = [];
                }
                dictionary[word].push({
                    pos: pos,
                    root: root,
                    meaning: meaning,
                    amharic: amharic,
                    original: entry[0]
                });
                totalWords++;
            }

            const wordCount = Object.keys(dictionary).length;
            document.getElementById('wordCountBadge').textContent = `${wordCount} ቃላት`;
            dataLoaded = true;

            console.log(`✅ Dictionary built: ${wordCount} unique words, ${totalWords} entries`);

            // Init features and show words
            if (typeof initWordOfTheDay === 'function') initWordOfTheDay();
            if (typeof initFlashcards === 'function') initFlashcards();
            if (typeof showAllWords === 'function') showAllWords();
        }

        // ================================================================
        //  TOAST (Simple version)
        // ================================================================

        function showToast(message) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ================================================================
        //  START: Try GitHub first, fallback to local
        // ================================================================

        // Wait for DOM to load then start
        document.addEventListener('DOMContentLoaded', function() {
            // Try loading from GitHub
            loadDictionaryFromGitHub();
        });

        console.log('📖 Dictionary App ready!');
        console.log(`📥 Will try to load from: ${CSV_URL}`);
        console.log('📚 Fallback: dictionary-data.js');
    </script>

    <!-- ============================================================ -->
    <!-- FALLBACK DATA (3 Sample Entries)                             -->
    <!-- ============================================================ -->
    <script>
        // This is the fallback data if GitHub fails
        const DICTIONARY_DATA = [
            ["abase", "v", "", "To lower in position, estimation, or the like; degrade", "ዝቅ ማድረግ፣ ማዋረድ"],
            ["abash", "v", "", "to make embarrassed or ashamed", "ማሳፈር፣ ማፍረር"],
            ["abbreviate", "v", "", "To shorten by omitting parts", "ማሳጠር"]
        ];
        console.log(`📚 Fallback data loaded: ${DICTIONARY_DATA.length} sample entries`);
    </script>

</body>
</html>
